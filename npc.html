<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NPC OFFSET CONVERTER TERMINAL</title>
    <style>
        :root {
            --primary: #00ff9d;
            --accent: #00cc7a;
            --bg: #0f0f0f;
            --card: #1a1a1a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: #e0e0e0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            padding: 15px 10px;
        }

        .container { 
            max-width: 960px; 
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: var(--primary);
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 15px var(--primary);
        }

        .card {
            background: var(--card);
            border: 1px solid rgba(0, 255, 157, 0.3);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 18px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }

        label {
            color: var(--primary);
            font-size: 14px;
            font-weight: 600;
            display: block;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        input, textarea {
            width: 100%;
            background: #111;
            border: 1px solid #333;
            color: #00ff9d;
            padding: 14px 16px;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 15px;
        }
        input:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 255, 157, 0.2);
            outline: none;
        }
        textarea { 
            min-height: 170px; 
            resize: vertical;
        }

        .mode-selector {
            background: #111;
            border: 1px solid var(--primary);
            padding: 16px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }
        .mode-selector:hover {
            background: #1f1f1f;
            border-color: var(--accent);
        }

        button {
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 15px;
        }
        button.red { 
            background: var(--primary); 
            color: #000;
            width: 100%;
            margin-top: 12px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 255, 157, 0.3);
        }

        .results {
            background: #0a0a0a;
            border: 1px solid var(--primary);
            padding: 18px;
            min-height: 190px;
            font-family: 'Courier New', monospace;
            color: #00ff9d;
            white-space: pre-wrap;
            border-radius: 10px;
            overflow-x: auto;
            line-height: 1.5;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .btn-group button {
            flex: 1;
        }

        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #111;
            color: var(--primary);
            padding: 16px 32px;
            border: 1px solid var(--primary);
            border-radius: 12px;
            display: none;
            z-index: 10000;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>NPC OFFSET CONVERTER</h1>

        <!-- Library -->
        <div class="card">
            <label>LIBRARY NAME</label>
            <input type="text" id="libName" value="libanogs.so">
        </div>

        <!-- Mode -->
        <div class="card">
            <label>CONVERSION MODE</label>
            <div class="mode-selector" id="modeDisplay" onclick="showModal()">
                Offsets → HexPatches <span style="color:#0f0;">▼</span>
            </div>
        </div>

        <!-- Input -->
        <div class="card">
            <label>INPUT OFFSETS</label>
            <textarea id="input" placeholder="Paste your offsets here... (one per line)"></textarea>
            <button onclick="convert()" class="red">CONVERT NOW</button>
        </div>

        <!-- Results -->
        <div class="card">
            <label>OUTPUT RESULT</label>
            <div class="results" id="output">Converted code will appear here...</div>
            <div class="btn-group">
                <button onclick="copyResult()" class="red">COPY RESULT</button>
                <button onclick="clearAll()">CLEAR ALL</button>
            </div>
        </div>
    </div>

    <!-- Mode Modal -->
    <div id="modal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.95); z-index:9999; padding:20px; overflow:auto;">
        <div style="background:#1a1a1a; border:1px solid var(--primary); border-radius:16px; max-width:400px; margin:40px auto;">
            <div style="padding:18px; text-align:center; color:var(--primary); font-weight:bold; border-bottom:1px solid #333;">SELECT MODE</div>
            <div id="modeOptions" style="padding:10px 0;"></div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast">COPIED TO CLIPBOARD ✓</div>

    <script>
        let currentMode = "Offsets → HexPatches";

        const allModes = [
            "Offsets → MemoryPatch",
            "Offsets → HexPatches"
        ];

        function showModal() {
            const container = document.getElementById('modeOptions');
            container.innerHTML = '';
            allModes.forEach(mode => {
                const div = document.createElement('div');
                div.style.padding = '16px 20px';
                div.style.borderBottom = '1px solid #333';
                div.style.cursor = 'pointer';
                div.style.color = mode === currentMode ? '#0f0' : '#ddd';
                div.textContent = mode;
                div.onclick = () => {
                    currentMode = mode;
                    document.getElementById('modeDisplay').innerHTML = `${mode} <span style="color:#0f0;">▼</span>`;
                    document.getElementById('modal').style.display = 'none';
                };
                container.appendChild(div);
            });
            document.getElementById('modal').style.display = 'block';
        }

        function extractOffset(str) {
            str = str.trim();
            const hexMatch = str.match(/0x([A-Fa-f0-9]+)/i) || str.match(/([A-Fa-f0-9]{5,})/);
            if (hexMatch) {
                let offset = hexMatch[1] || hexMatch[0];
                return '0x' + offset.replace(/^0x/i, '').toUpperCase();
            }
            return null;
        }

        function convert() {
            const lib = document.getElementById('libName').value.trim() || "libanogs.so";
            let inputText = document.getElementById('input').value.trim();
            
            if (!inputText) return alert("Input is empty!");

            const lines = inputText.split('\n').map(l => l.trim()).filter(l => l);
            let output = '';

            lines.forEach(raw => {
                const offset = extractOffset(raw);
                if (!offset) return;

                if (currentMode === "Offsets → HexPatches") {
                    output += `HexPatches.MemoryPatch("${lib}", ${offset}, "h00 00 80 D2 C0 03 5F D6", 32);\n`;
                } 
                else if (currentMode === "Offsets → MemoryPatch") {
                    output += `MemoryPatch::createWithHex("${lib}", ${offset}, "000080D2C0035FD6").Modify();\n`;
                }
            });

            document.getElementById('output').textContent = output.trim() || "No valid offset found.";
        }

        async function copyResult() {
            const text = document.getElementById('output').textContent.trim();
            if (!text || text === "Converted code will appear here..." || text === "No valid offset found.") {
                alert("Nothing to copy!");
                return;
            }

            try {
                await navigator.clipboard.writeText(text);
                const toast = document.getElementById('toast');
                toast.style.display = 'block';
                setTimeout(() => toast.style.display = 'none', 1800);
            } catch (e) {
                alert("✅ COPIED!");
            }
        }

        function clearAll() {
            document.getElementById('input').value = '';
            document.getElementById('output').textContent = "Converted code will appear here...";
        }
    </script>
</body>
</html>
